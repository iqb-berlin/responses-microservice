services:
  responses-microservice:
    image: ghcr.io/iqb-berlin/responses-microservice:0.1.0
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      NODE_ENV: production
      BODY_LIMIT: 10mb
      RATE_LIMIT_MAX: "300"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
